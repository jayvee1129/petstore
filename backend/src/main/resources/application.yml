spring:
  application:
    name: petstore-backend

  datasource:
    url: jdbc:h2:mem:petstore
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  address: 0.0.0.0
  port: ${PORT:10000}
  shutdown: graceful

logging:
  level:
    root: INFO
    com.salac.petstore: DEBUG

# Production persistence uses PostgreSQL.
# Activate with SPRING_PROFILES_ACTIVE=postgres or spring.profiles.active=postgres
