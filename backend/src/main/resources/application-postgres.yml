spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:${PGHOST:localhost}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE:${POSTGRES_DB:petstore}}}?sslmode=${DB_SSL_MODE:require}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:${POSTGRES_USER:petstore}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:${POSTGRES_PASSWORD:password}}}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 1
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  address: 0.0.0.0
  port: ${PORT:10000}
  shutdown: graceful

logging:
  level:
    root: INFO
    com.salac.petstore: DEBUG
    org.springframework.boot: INFO
    org.springframework.web: INFO
