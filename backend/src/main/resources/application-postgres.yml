spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:${PGHOST:localhost}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE:${POSTGRES_DB:petstore}}}?sslmode=${DB_SSL_MODE:require}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:${POSTGRES_USER:petstore}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:${POSTGRES_PASSWORD:password}}}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 1
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate
      temp:
        use_jdbc_metadata_defaults: false
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  address: 0.0.0.0
  port: ${PORT:10000}

logging:
  level:
    com.salac.petstore: DEBUG
    org.springframework.web: DEBUG
