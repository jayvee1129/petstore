services:
  - type: web
    name: petstore-api
    plan: free
    env: docker
    branch: main
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: db_petstore
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: db_petstore
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: db_petstore
          property: password

  - type: web
    name: petstore-web
    plan: free
    env: static
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: petstore-api
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: db_petstore
    plan: free
    databaseName: petstore
    user: petstore
