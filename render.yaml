services:
  - type: web_service
    name: petstore-backend
    env: java
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: ./mvnw -B package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/petstore-backend-0.0.1-SNAPSHOT.jar
    autoDeploy: true
    envVars:
      - key: JAVA_VERSION
        value: 17

staticSites:
  - name: petstore-frontend
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
