services:
  - type: web
    name: petstore-api
    plan: free
    env: docker
    branch: main
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DB_HOST
        fromDatabase:
          name: db_petstore
          property: host
      - key: DB_PORT
        fromDatabase:
          name: db_petstore
          property: port
      - key: DB_NAME
        fromDatabase:
          name: db_petstore
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: db_petstore
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: db_petstore
          property: password
      - key: DB_SSL_MODE
        value: require

  - type: web
    name: petstore-web
    env: static
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: petstore-api
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: db_petstore
    plan: free
    databaseName: petstore
    user: petstore
